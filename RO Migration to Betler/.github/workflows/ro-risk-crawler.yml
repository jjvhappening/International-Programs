name: RO Risk Crawler

on:
  schedule:
    # Monday 09:00 UTC (== 09:00 GMT in winter, 10:00 BST in summer)
    # Adjust to 0 8 * * 1 when BST is active if you want 09:00 local time
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual runs from the GitHub Actions UI

permissions:
  contents: write # Needed to commit the updated risk-register.json

jobs:
  crawl:
    name: Weekly risk crawl
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit can trigger subsequent workflows if needed.
          # Falls back to GITHUB_TOKEN if RO_CRAWLER_PAT is not set.
          token: ${{ secrets.RO_CRAWLER_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python crawler.py

      - name: Commit updated risk register
        run: |
          git config user.name "RO Risk Crawler [bot]"
          git config user.email "crawler@github-actions"
          git add risk-register.json
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m "chore: risk register update $(date -u +%Y-%m-%d)"
          git push
